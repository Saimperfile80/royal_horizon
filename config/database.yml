# PostgreSQL. Versions 9.3 and up are supported.
#
# Install the pg driver:
#   gem install pg
# On macOS with Homebrew:
#   gem install pg -- --with-pg-config=/usr/local/bin/pg_config
# On Windows:
#   gem install pg
#       Choose the win32 build.
#       Install PostgreSQL and put its /bin directory on your path.
#
# Configure Using Gemfile
# gem "pg"
#
default: &default
  adapter: postgresql
  encoding: unicode
  pool: 5
  username: postgres
  password: "Saimperfile80"
  host: 127.0.0.1

development:
  <<: *default
  database: royal_horizon_development
  username: postgres
  password: "Saimperfile80"
  host: 127.0.0.1


test:
  <<: *default
  database: royal_horizon_test

production:
  primary: &primary_production
    <<: *default
    database: royal_horizon_production
    username: royal_horizon
    password: <%= ENV["ROYAL_HORIZON_DATABASE_PASSWORD"] %>
  cache:
    <<: *primary_production
    database: royal_horizon_production_cache
    migrations_paths: db/cache_migrate
  queue:
    <<: *primary_production
    database: royal_horizon_production_queue
    migrations_paths: db/queue_migrate
  cable:
    <<: *primary_production
    database: royal_horizon_production_cable
    migrations_paths: db/cable_migrate
